version: '3.1'

services:
  # MongoDB 数据库
  mongo:
    image: mongo
    restart: always
    ports:
      - 27017:27017
    volumes:
      - ./db2:/data/db
    environment:
      TZ: Asia/Shanghai
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  # MongoDB 管理界面
  mongo-express:
    image: mongo-express
    depends_on:
      - mongo
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: example
      ME_CONFIG_MONGODB_URL: mongodb://root:example@mongo:27017/

  # 后端服务 (生产版)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: express-admin-backend-prod
    restart: always
    ports:
      - "8888:8888"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://root:example@mongo:27017/admin?authSource=admin
    depends_on:
      - mongo

  # Nginx 服务 (用于提供前端静态文件)
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: cacti-admin-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend

  chat-ai:
    build:
      context: ../chat-ai
      dockerfile: Dockerfile.prod
    container_name: chat-ai-prod
    restart: always
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
